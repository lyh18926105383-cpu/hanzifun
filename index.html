<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="工具头像.png">
    <link rel="apple-touch-icon" href="工具头像.png">
    <meta name="description" content="汉字饭（hanzifun）是面向3-6岁儿童的趣味识字工具，通过互动卡片帮助家长轻松教孩子学汉字。A fun Chinese character learning tool for kids aged 3-6, helping parents teach children to read Chinese characters through interactive flashcards.">
    <meta name="keywords" content="汉字,识字,儿童识字,学汉字,汉字卡片,识字卡片,幼儿识字,3-6岁,趣味识字,汉字启蒙,汉字饭,hanzifun,Chinese characters,learn Chinese,Chinese flashcards for kids,preschool Chinese learning">
    <title>汉字饭 hanzifun - 儿童识字卡片 | 3-6岁趣味学汉字 | Learn Chinese Characters for Kids</title>

    <!-- Open Graph / 社交分享 -->
    <meta property="og:title" content="汉字饭 hanzifun - 儿童识字卡片 | 3-6岁趣味学汉字">
    <meta property="og:description" content="面向3-6岁儿童的趣味识字工具，通过互动卡片帮助家长轻松教孩子学汉字。A fun Chinese character learning tool for kids aged 3-6.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hanzifun.online">
    <meta property="og:locale" content="zh_CN">
    <meta property="og:site_name" content="汉字饭 hanzifun">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="汉字饭 hanzifun - 儿童识字卡片 | 3-6岁趣味学汉字">
    <meta name="twitter:description" content="面向3-6岁儿童的趣味识字工具，通过互动卡片帮助家长轻松教孩子学汉字。A fun Chinese character learning tool for kids aged 3-6.">

    <!-- 结构化数据 -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "汉字饭 hanzifun",
      "alternateName": "hanzifun",
      "url": "https://hanzifun.online",
      "description": "面向3-6岁儿童的趣味识字工具，通过互动卡片帮助家长轻松教孩子学汉字。A fun Chinese character learning tool for kids aged 3-6, helping parents teach children to read Chinese characters through interactive flashcards.",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "All",
      "inLanguage": ["zh-CN", "en"],
      "educationalUse": "learning Chinese characters for preschool children",
      "typicalAgeRange": "3-6",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "CNY"
      }
    }
    </script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- 页面头部 -->
    <header class="site-header">
        <img class="site-logo" src="工具头像.png" alt="汉字饭logo">
        <span class="site-title"><span class="site-title-line1">汉字饭 hanzifun</span><span class="site-title-line2">3-6岁趣味学汉字</span></span>
    </header>

    <!-- 背景装饰 -->
    <div class="bg-decor d1">☁️</div>
    <div class="bg-decor d2">⭐</div>
    <div class="bg-decor d3">🌸</div>
    <div class="bg-decor d4">🍀</div>
    <div class="bg-decor d5">🌈</div>
    <div class="bg-decor d6">💫</div>

    <!-- ============ 开始页面 ============ -->
    <div class="start-screen" id="startScreen">
        <div class="logo-area">
            <span class="logo-icon">📚</span>
            <span class="main-title">汉字启蒙卡片</span>
            <span class="logo-icon">✏️</span>
        </div>
        <p class="subtitle">翻一翻 · 认一认 · 快乐学汉字</p>
        <div class="btn-grid">
            <button class="start-btn easy" data-count="5">
                <span class="btn-emoji">🌟</span>5个字<span class="btn-label">轻松学</span>
            </button>
            <button class="start-btn standard" data-count="10">
                <span class="btn-emoji">📖</span>10个字<span class="btn-label">标准学</span>
            </button>
            <button class="start-btn challenge" data-count="20">
                <span class="btn-emoji">🎯</span>20个字<span class="btn-label">挑战学</span>
            </button>
            <button class="start-btn custom" id="btnCustomToggle">
                <span class="btn-emoji">✏️</span>自定义<span class="btn-label">自己定</span>
            </button>
        </div>
        <div class="custom-input-area" id="customInputArea">
            <input type="number" class="custom-input" id="customCount" value="8" min="1" max="200" inputmode="numeric">
            <button class="custom-go-btn" id="btnCustomGo">✅ 开始</button>
            <span class="custom-hint">输入1-200之间的数字</span>
        </div>
        <button class="history-open-button" id="btnOpenHistory" type="button" aria-haspopup="dialog">
            <span aria-hidden="true">📊</span>
            <span>学习足迹</span>
            <span class="history-open-summary" id="historyOpenSummary">尚无记录</span>
        </button>
    </div>

    <!-- ============ 学习页面（初始隐藏） ============ -->
    <div class="learn-screen" id="learnScreen">
        <div class="header">
            <span style="position:relative;display:flex;align-items:center;gap:8px;">
                <button class="back-btn" id="btnBackToStart" title="返回首页">🏠</button>
                <span class="title">📚 汉字启蒙卡片 ✏️</span>
            </span>
        </div>

        <div class="progress-area">
            <span class="progress-text" id="progressText">0 / 5</span>
            <div class="progress-bar-outer"><div class="progress-bar-inner" id="progressBar" style="width: 0%;"></div></div>
            <span>🎯</span>
        </div>

        <div class="stats-indicator">
            <span><span class="stats-dot green"></span>熟悉：<strong id="familiarCount">0</strong></span>
            <span><span class="stats-dot orange"></span>不熟悉：<strong id="unfamiliarCount">0</strong></span>
            <span>📝剩余：<strong id="remainingCount">5</strong></span>
        </div>

        <div class="card-container" id="cardContainer" title="点击卡片翻转">
            <div class="card" id="card">
                <div class="card-face card-front">
                    <span class="type-badge noun" id="typeBadge">名词</span>
                    <span class="hanzi" id="hanziDisplay">山</span>
                </div>
                <div class="card-back card-face">
                    <span class="corner-decor cd1">✨</span><span class="corner-decor cd2">🌟</span>
                    <span class="corner-decor cd3">💖</span><span class="corner-decor cd4">🎀</span>
                    <span class="image-display" id="imageDisplay">🏔️</span>
                    <span class="word-label" id="wordLabel">山</span>
                    <span class="hint-text" id="hintText">看图识字</span>
                </div>
            </div>
        </div>

        <div class="buttons-area">
            <button class="btn btn-familiar" id="btnFamiliar">✅ 熟悉</button>
            <button class="btn btn-unfamiliar" id="btnUnfamiliar">🔍 不熟悉</button>
        </div>
    </div>

    <!-- 总结弹窗 -->
    <div class="summary-overlay" id="summaryOverlay">
        <div class="summary-panel">
            <div class="summary-emoji" id="summaryEmoji">🎉</div>
            <h2 id="summaryTitle">太棒了！</h2>
            <p style="color:#6b5a4e;margin:4px 0;">你已完成本轮汉字学习</p>
            <div class="summary-stats">
                <div class="summary-stat"><div class="num green" id="summaryFamiliar">0</div><div class="lbl">✅ 熟悉</div></div>
                <div class="summary-stat"><div class="num orange" id="summaryUnfamiliar">0</div><div class="lbl">🔍 不熟悉</div></div>
            </div>
            <div class="btn-row">
                <button class="btn-sm btn-review" id="btnReview" style="display:none;">📖 复习不熟悉的字</button>
                <button class="btn-sm btn-restart" id="btnRestart">🔄 重新学习</button>
                <button class="btn-sm btn-back-start" id="btnBackStartFromSummary">🏠 返回首页</button>
                <button class="btn-sm btn-close-summary" id="btnCloseSummary">✕ 关闭</button>
            </div>
        </div>
    </div>

    <!-- 本机学习记录 -->
    <div class="history-overlay" id="historyOverlay" aria-hidden="true">
        <section class="history-panel" role="dialog" aria-modal="true" aria-labelledby="historyTitle">
            <div class="history-header">
                <div>
                    <h2 id="historyTitle">学习足迹</h2>
                    <p>当前设备的学习记录</p>
                </div>
                <button class="history-close-button" id="btnCloseHistory" type="button" aria-label="关闭学习记录" title="关闭">✕</button>
            </div>
            <div class="history-metrics">
                <div><strong id="historyRoundCount">0</strong><span>学习轮次</span></div>
                <div><strong id="historyCharacterCount">0</strong><span>已学汉字</span></div>
                <div><strong id="historyWeakCount">0</strong><span>薄弱字</span></div>
            </div>
            <section class="history-section" aria-labelledby="weakCharactersTitle">
                <h3 id="weakCharactersTitle">需要复习</h3>
                <p class="weak-characters" id="weakCharacters">目前没有薄弱字</p>
            </section>
            <section class="history-section" aria-labelledby="recentSessionsTitle">
                <h3 id="recentSessionsTitle">最近学习</h3>
                <div class="recent-sessions" id="recentSessions">
                    <p class="history-empty">完成一轮学习后会显示记录</p>
                </div>
            </section>
            <div class="history-actions">
                <button class="history-clear-button" id="btnClearHistory" type="button">清空记录</button>
            </div>
            <div class="history-clear-confirm" id="historyClearConfirm" hidden>
                <p>确定清空当前设备上的全部学习记录吗？</p>
                <div>
                    <button class="history-cancel-clear" id="btnCancelClearHistory" type="button">取消</button>
                    <button class="history-confirm-clear" id="btnConfirmClearHistory" type="button">确认清空</button>
                </div>
            </div>
        </section>
    </div>

    <div class="toast" id="toast"></div>

    <script src="characters.js"></script>
    <script src="storage.js"></script>
    <script src="app.js"></script>
</body>
</html>
